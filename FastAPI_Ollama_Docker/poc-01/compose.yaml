services:
    web_app:
        build: fastapi_app
        container_name: fastapi_web_container
        ports:
            - "8000:8000"
        volumes:
            - ./fastapi_app:/app
        networks:
            - my-dkr-container-network

    ollama:
        build:
            context: ./ollama_container
            dockerfile: Ollama.Dockerfile
        container_name: ollama_container
        ports:
            - "11434:11434"
        volumes:
            - ollama_data:/ollama_data_dkr_container
        networks:
            - my-dkr-container-network
        entrypoint: ['/usr/bin/bash', "/pull-llama3.sh"]
        
networks:
    my-dkr-container-network:
        driver: bridge

volumes:
    ollama_data:
        driver: local

